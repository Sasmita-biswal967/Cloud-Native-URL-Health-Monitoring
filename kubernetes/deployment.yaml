apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-url-monitor

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloud-url-monitor

  template:
    metadata:
      labels:
        app: cloud-url-monitor

    spec:
      containers:
      - name: cloud-url-monitor
        image: sasmita205/cloud-url-monitor:latest

        ports:
        - containerPort: 8000
